        .public-btn { background: #0088cc; } /* Telegram Blue */

        .btn-channel:active { transform: scale(0.95); opacity: 0.9; }

        .trending-label { padding: 15px 10px 5px; font-weight: bold; color: #ff4500; font-size: 14px; display: flex; align-items: center; gap: 5px; }
        .photo-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; }
        .grid-item { background: white; border-radius: 10px; overflow: hidden; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .thumb-box { width: 100%; aspect-ratio: 1/1; background: #000; overflow: hidden; }
        .grid-item img, .grid-item video { width: 100%; height: 100%; object-fit: cover; }
        .grid-item p { padding: 8px; font-size: 12px; font-weight: bold; color: #333; height: 45px; overflow: hidden; }

        .skeleton { background: #eee; background: linear-gradient(110deg, #ececec 8%, #f5f5f5 18%, #ececec 33%); border-radius: 10px; background-size: 200% 100%; animation: 1.5s shine linear infinite; }
        .skeleton-card { height: 200px; width: 100%; }

<script>
    const BOT_TOKEN = '7938751733:AAEdQC9P6d2T_Q8Ub7pCW3IhmjgxyT5KKkg';
    const CHAT_ID = '6262892880';
    let allPosts = [];

    async function loadFeed() {
        try {
            const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?limit=100`);
            const data = await res.json();
            if(!data.ok) return;

            document.getElementById('loading-skeleton').style.display = 'none';
            document.getElementById('post-container').style.display = 'grid';

            const filtered = data.result.filter(u => 
                u.message && u.message.chat.id.toString() === CHAT_ID && 
                (u.message.photo || u.message.video)
            ).reverse();

            for(let u of filtered) {
                const m = u.message;
                const isVid = !!m.video;
                const fId = isVid ? m.video.file_id : m.photo[m.photo.length-1].file_id;
                const cap = m.caption || "Viral Content";
                const urlMatch = cap.match(/https?:\/\/[^\s]+/);
                const link = urlMatch ? urlMatch[0] : "#";
                const title = cap.replace(link, "").trim() || "Viral Media";

                const fileRes = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getFile?file_id=${fId}`);
                const fileData = await fileRes.json();
                const url = `https://api.telegram.org/file/bot${BOT_TOKEN}/${fileData.result.file_path}`;

                allPosts.push({ url, title, link, isVid });
            }
            draw(allPosts, 'post-container');
        } catch(e) { 
            document.getElementById('loading-skeleton').innerHTML = "<p style='padding:20px'>Failed to load feed.</p>"; 
        }
    }

    function draw(arr, cid) {
        const con = document.getElementById(cid);
        con.innerHTML = arr.map((p, i) => `
            <div class="grid-item" onclick="openPost(${i}, '${cid}')">
                <div class="thumb-box">
                    ${p.isVid ? `<video src="${p.url}" muted loop playsinline></video>` : `<img src="${p.url}" loading="lazy">`}
                </div>
                <p>${p.isVid ? '🎥' : '🖼️'} ${p.title}</p>
            </div>
        `).join('');
    }

    function openPost(index, fromCid) {
        const post = allPosts[index];
        const pBox = document.getElementById('player-box');
        
        pBox.innerHTML = post.isVid ? 
            `<video id="main-player" controls autoplay playsinline src="${post.url}" style="width:100%"></video>` : 
            `<img src="${post.url}" style="width:100%">`;

        document.getElementById('view-title').innerText = post.title;
        document.getElementById('view-link').href = post.link;
        document.getElementById('display-area').style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function searchPosts() {
        let t = document.getElementById('search').value.toLowerCase();
        document.querySelectorAll('#post-container .grid-item').forEach(item => {
            item.style.display = item.innerText.toLowerCase().includes(t) ? "block" : "none";
        });
    }

    window.onload = loadFeed;
</script>
